spring.application.name=RateLimiting

server.port=8090

spring.cloud.gateway.discovery.locator.enable=true

# Redis Configuration (Unified prefix for the custom RedisProperties bean)
spring.redis.host=${REDIS_HOST:43.205.126.61}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:redispassword}
spring.redis.timeout=${REDIS_TIMEOUT:2000}

# Rate Limiter Algorithm Properties
rate-limiter.capacity=10
rate-limiter.refill-rate=5
rate-limiter.api-server-url=http://localhost:9999
rate-limiter.timeout=50000

# Global CORS Configuration for the Frontend Dashboard
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
